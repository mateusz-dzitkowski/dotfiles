[colors]
background = #1e1e2e
background-alt = #1e1e2e
foreground = #cdd6f4
primary    = #89b4fa
secondary  = #a6e3a1
alert      = #f38ba8
disabled   = #707880

[bar/main]
width = 100%
height = 18pt

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1pt

border-size = 4
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font Mono,JetBrainsMono NFM:style=Regular;3
font-1 = Weather Icons:size=12;3
font-2 = "Symbols Nerd Font:size=14;3"

modules-left = xworkspaces xwindow
modules-right = brightnessctl pulseaudio xkeyboard openweathermap-simple memory cpu battery date

cursor-click = pointer
cursor-scroll = pointer

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/openweathermap-simple]
type = custom/script
exec = ~/.scripts/openweathermap-simple.sh
interval = 600
label-font = 2

[module/date]
type = internal/date
interval = 1

date-alt = %H:%M
date = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery

full-at = 99
low-at = 5

battery = BAT1
adapter = ADP1

poll-interval = 5

format-charging = ůįāĄ <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = ůįĀĻ <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀľ
ramp-capacity-2 = ůįĀŅ
ramp-capacity-3 = ůįāā
ramp-capacity-4 = ůįĀĻ

[module/brightnessctl]
type = custom/script
exec = ~/.scripts/brightnessctl.sh

click-left = pgrep -x redshift > /dev/null && pkill redshift > /dev/null || redshift &

scroll-up = exec brightnessctl set +5%
scroll-down = exec brightnessctl set 5%-
interval = 1

label = %output%
label-foreground = ${colors.foreground}
label-font = 3

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
