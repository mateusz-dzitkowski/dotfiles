enable_audio_bell no

font_size 20.0

scrollback_lines 10000

clipboard_control write-clipboard write-primary read-clipboard read-primary

# BEGIN_KITTY_COLOUR_PALETTE
background #1e1e2e
foreground #cdd6f4
cursor #f5c2e7
selection_background #313244

color0  #11111b
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #cba6f7
color6  #94e2d5
color7  #bac2de
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7
color14 #94e2d5
color15 #f5e0dc 
# END_KITTY_COLOUR_PALETTE

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# BEGIN_KEY_MAPS
map ctrl+shift+enter new_window_with_cwd

map ctrl+shift+left  resize_window narrower 5
map ctrl+shift+right resize_window wider 5
map ctrl+shift+up    resize_window taller 5
map ctrl+shift+down  resize_window shorter 5
# END_KEY_MAPS
