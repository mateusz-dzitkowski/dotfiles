enable_audio_bell no

font_size 20.0

scrollback_lines 10000

clipboard_control write-clipboard write-primary read-clipboard read-primary

disable_ligatures always

tab_bar_style       powerline
tab_powerline_style slanted

# BEGIN_KITTY_COLOUR_PALETTE
background #1e1e2e
foreground #cdd6f4
cursor #f5c2e7
selection_background #313244

color0  #11111b
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #cba6f7
color6  #94e2d5
color7  #bac2de
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7
color14 #94e2d5
color15 #f5e0dc 
# END_KITTY_COLOUR_PALETTE

# BEGIN_KITTY_FONTS
font_family      family="JetBrains Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+ed00-U+efce,U+f000-U+f2ff,U+f0001-U+f1af0,U+f300-U+f372,U+f400-U+f533,U+e700-U+e7c5 JetBrainsMono Nerd Font Mono
# END_KITTY_FONTS

# BEGIN_KEY_MAPS
map ctrl+shift+enter new_window_with_cwd
# END_KEY_MAPS
